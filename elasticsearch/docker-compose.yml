version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: velqip-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      xpack.security.http.ssl.enabled: 'false'
      xpack.security.transport.ssl.enabled: 'false'
      bootstrap.memory_lock: 'true'
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health?local=true || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  elasticsearch-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velqip-es-api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8081
      ES_URL: http://elasticsearch:9200
      ES_API_KEY: ${ES_API_KEY:-change-me}
      ES_PRODUCTS_INDEX: ${ES_PRODUCTS_INDEX:-velqip_products}
      ES_ROUTE_PREFIX: ${ES_ROUTE_PREFIX:-/elastic}
      ES_USERNAME: ${ES_USERNAME:-}
      ES_PASSWORD: ${ES_PASSWORD:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_SYNC_RPC: ${SUPABASE_SYNC_RPC:-get_denormalized_products}
      ES_SYNC_BATCH_SIZE: ${ES_SYNC_BATCH_SIZE:-100}
      ES_STARTUP_TIMEOUT: ${ES_STARTUP_TIMEOUT:-90}
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: velqip-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    restart: unless-stopped
    profiles:
      - observability

volumes:
  esdata:
